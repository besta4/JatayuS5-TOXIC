<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merchant Portal – Jatayu</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "Helvetica",
                "Arial",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>

    <script
      src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"
      defer
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
          sans-serif;
        background: #000000;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        opacity: 0.4;
        z-index: 0;
      }

      .card {
        background: rgba(18, 18, 18, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(20px);
        border-radius: 16px;
        transition: all 0.2s ease;
      }

      .card:hover {
        border-color: rgba(255, 255, 255, 0.1);
      }

      .header-bar {
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .logo-mark {
        width: 32px;
        height: 32px;
        object-fit: contain;
        filter: drop-shadow(0 0 10px rgba(62, 228, 255, 0.15));
      }

      .btn-primary {
        background: #ffffff;
        color: #000000;
        font-weight: 600;
        transition: all 0.2s ease;
        border-radius: 10px;
      }

      .btn-primary:hover {
        background: rgba(255, 255, 255, 0.9);
        transform: translateY(-1px);
      }

      .status-completed {
        color: #10b981;
      }
      .status-held {
        color: #f59e0b;
      }
      .status-blocked {
        color: #ef4444;
      }

      .payment-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        transition: all 0.2s ease;
      }

      .payment-item:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.1);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        animation: fadeIn 0.4s ease;
      }
    </style>
  </head>

  <body class="min-h-screen">
    <!-- Header -->
    <header
      class="header-bar sticky top-0 z-50 px-6 py-4 flex items-center justify-between"
    >
      <div class="flex items-center gap-3">
        <img
          src="/static/assets/jatayu-logo.png"
          alt="Jatayu Logo"
          class="logo-mark"
        />
        <span style="font-size: 17px; font-weight: 600; letter-spacing: -0.3px"
          >Jatayu Merchant</span
        >
      </div>
      <div class="flex items-center gap-4">
        <button
          onclick="showSendPaymentModal()"
          class="btn-primary px-4 py-2 flex items-center gap-2"
          style="font-size: 14px"
        >
          <i class="ph ph-paper-plane-tilt"></i> Send Payment
        </button>
        <span
          id="business-name"
          style="font-size: 14px; color: rgba(255, 255, 255, 0.5)"
        ></span>
        <button
          onclick="logout()"
          style="
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
          "
          onmouseover="this.style.color = 'rgba(255, 255, 255, 0.9)'"
          onmouseout="this.style.color = 'rgba(255, 255, 255, 0.5)'"
        >
          Sign Out
        </button>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 relative z-10">
      <!-- Stats Grid -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="card p-6">
          <p
            style="
              font-size: 13px;
              color: rgba(255, 255, 255, 0.5);
              margin-bottom: 8px;
              font-weight: 500;
            "
          >
            Total Balance
          </p>
          <p
            id="balance"
            style="font-size: 36px; font-weight: 600; letter-spacing: -1px"
          >
            Loading...
          </p>
        </div>

        <div class="card p-6">
          <p
            style="
              font-size: 13px;
              color: rgba(255, 255, 255, 0.5);
              margin-bottom: 8px;
              font-weight: 500;
            "
          >
            Today's Revenue
          </p>
          <p
            id="today-revenue"
            style="
              font-size: 36px;
              font-weight: 600;
              letter-spacing: -1px;
              color: #10b981;
            "
          >
            ₹0
          </p>
        </div>

        <div class="card p-6">
          <p
            style="
              font-size: 13px;
              color: rgba(255, 255, 255, 0.5);
              margin-bottom: 8px;
              font-weight: 500;
            "
          >
            Today's Transactions
          </p>
          <p
            id="today-count"
            style="font-size: 36px; font-weight: 600; letter-spacing: -1px"
          >
            0
          </p>
        </div>
      </div>

      <!-- Analytics Row -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div class="card p-6">
          <h2
            style="
              font-size: 17px;
              font-weight: 600;
              letter-spacing: -0.3px;
              margin-bottom: 16px;
            "
          >
            Weekly Summary
          </h2>
          <div id="weekly-summary" class="space-y-2">
            <p
              style="
                color: rgba(255, 255, 255, 0.4);
                text-align: center;
                padding: 32px 0;
                font-size: 14px;
              "
            >
              Loading analytics...
            </p>
          </div>
        </div>

        <div class="card p-6">
          <h2
            style="
              font-size: 17px;
              font-weight: 600;
              letter-spacing: -0.3px;
              margin-bottom: 16px;
            "
          >
            Top Customers
          </h2>
          <div id="top-customers" class="space-y-2">
            <p
              style="
                color: rgba(255, 255, 255, 0.4);
                text-align: center;
                padding: 32px 0;
                font-size: 14px;
              "
            >
              Loading...
            </p>
          </div>
        </div>
      </div>

      <!-- Recent Payments -->
      <div class="card p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 style="font-size: 17px; font-weight: 600; letter-spacing: -0.3px">
            Recent Payments
          </h2>
          <button
            onclick="loadPayments()"
            style="
              font-size: 14px;
              color: rgba(255, 255, 255, 0.5);
              background: none;
              border: none;
              cursor: pointer;
              transition: color 0.2s;
              font-weight: 500;
            "
            onmouseover="this.style.color = 'rgba(255, 255, 255, 0.9)'"
            onmouseout="this.style.color = 'rgba(255, 255, 255, 0.5)'"
          >
            <i class="ph ph-arrows-clockwise mr-1"></i> Refresh
          </button>
        </div>
        <div id="payments-list" class="space-y-2">
          <p
            style="
              color: rgba(255, 255, 255, 0.4);
              text-align: center;
              padding: 48px 0;
              font-size: 14px;
            "
          >
            Loading payments...
          </p>
        </div>
      </div>
    </main>

    <!-- Send Payment Modal -->
    <div
      id="send-payment-modal"
      class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50"
      onclick="if (event.target === this) closeSendPaymentModal();"
    >
      <div class="card p-8 w-full max-w-md mx-4">
        <div class="flex items-center justify-between mb-6">
          <h2 style="font-size: 20px; font-weight: 600; letter-spacing: -0.3px">
            Send Payment
          </h2>
          <button
            onclick="closeSendPaymentModal()"
            style="
              color: rgba(255, 255, 255, 0.5);
              font-size: 24px;
              background: none;
              border: none;
              cursor: pointer;
            "
          >
            &times;
          </button>
        </div>
        <form
          id="send-payment-form"
          onsubmit="handleSendPayment(event)"
          class="space-y-5"
        >
          <div>
            <label
              style="
                font-size: 13px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.7);
                display: block;
                margin-bottom: 8px;
              "
              >Recipient User ID or Email</label
            >
            <input
              type="text"
              id="payment-receiver"
              required
              placeholder="e.g., alice@demo.com or user_xxx"
              style="
                width: 100%;
                padding: 12px 16px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                color: #fff;
                font-size: 15px;
              "
            />
          </div>
          <div>
            <label
              style="
                font-size: 13px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.7);
                display: block;
                margin-bottom: 8px;
              "
              >Amount (₹)</label
            >
            <input
              type="number"
              id="payment-amount"
              required
              min="1"
              step="0.01"
              placeholder="0.00"
              style="
                width: 100%;
                padding: 12px 16px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                color: #fff;
                font-size: 15px;
              "
            />
          </div>
          <div>
            <label
              style="
                font-size: 13px;
                font-weight: 500;
                color: rgba(255, 255, 255, 0.7);
                display: block;
                margin-bottom: 8px;
              "
              >Note (optional)</label
            >
            <input
              type="text"
              id="payment-note"
              placeholder="Payment for services"
              style="
                width: 100%;
                padding: 12px 16px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                color: #fff;
                font-size: 15px;
              "
            />
          </div>
          <div
            id="send-payment-error"
            class="hidden"
            style="color: #ff4444; font-size: 14px; text-align: center"
          ></div>
          <div
            id="send-payment-success"
            class="hidden"
            style="color: #10b981; font-size: 14px; text-align: center"
          ></div>
          <button
            type="submit"
            class="btn-primary w-full py-3"
            style="font-size: 15px"
          >
            <i class="ph ph-paper-plane-tilt mr-2"></i> Send Payment
          </button>
        </form>
      </div>
    </div>

    <script>
      let currentUser = null;

      // Auth check
      const token = localStorage.getItem("jatayu_token");
      if (!token) {
        window.location.href = "/login";
      } else {
        currentUser = JSON.parse(localStorage.getItem("jatayu_user") || "{}");
        if (currentUser.user_type === "ADMIN") {
          window.location.href = "/admin";
        } else if (currentUser.user_type === "CUSTOMER") {
          window.location.href = "/dashboard";
        }
        document.getElementById("business-name").textContent =
          currentUser.business_name ||
          currentUser.display_name ||
          currentUser.email;
        loadAll();
      }

      async function apiCall(endpoint, options = {}) {
        const headers = {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          ...options.headers,
        };
        const res = await fetch(endpoint, { ...options, headers });
        if (res.status === 401) {
          localStorage.clear();
          document.cookie = "jatayu_token=; Max-Age=0; Path=/; SameSite=Lax";
          window.location.href = "/login";
        }
        return res;
      }

      async function loadAll() {
        loadBalance();
        loadPayments();
        loadAnalytics();
      }

      async function loadBalance() {
        try {
          const res = await apiCall("/users/accounts");
          const data = await res.json();
          if (data[0]) {
            document.getElementById("balance").textContent =
              `₹${Number(data[0].balance).toLocaleString("en-IN")}`;
          }
        } catch (err) {
          document.getElementById("balance").textContent = "Error";
        }
      }

      async function loadPayments() {
        try {
          // Get all transactions (sent and received)
          const res = await apiCall("/transactions/?limit=30");
          const data = await res.json();
          const transactions = Array.isArray(data)
            ? data
            : data.transactions || [];
          const list = document.getElementById("payments-list");

          if (transactions.length === 0) {
            list.innerHTML =
              '<p class="text-slate-400 text-center py-8">No transactions yet</p>';
            return;
          }

          // Calculate today's stats (revenue = received payments)
          const today = new Date().toDateString();
          let todayRevenue = 0;
          let todayCount = 0;

          transactions.forEach((p) => {
            const isReceived = p.receiver_id === currentUser.user_id;
            if (
              new Date(p.initiated_at).toDateString() === today &&
              p.status === "COMPLETED" &&
              isReceived
            ) {
              todayRevenue += p.amount;
              todayCount++;
            }
          });

          document.getElementById("today-revenue").textContent =
            `₹${todayRevenue.toLocaleString("en-IN")}`;
          document.getElementById("today-count").textContent = todayCount;

          list.innerHTML = transactions
            .map((p) => {
              const isReceived = p.receiver_id === currentUser.user_id;
              const statusClass =
                p.status === "COMPLETED"
                  ? "status-completed"
                  : p.status === "HELD"
                    ? "status-held"
                    : "status-blocked";
              const arrowIcon = isReceived
                ? "ph-arrow-down-left"
                : "ph-arrow-up-right";
              const arrowColor = isReceived ? "#10b981" : "#f59e0b";
              const amountPrefix = isReceived ? "+" : "-";
              const amountColor = isReceived ? "#10b981" : "#f59e0b";
              const counterparty = isReceived ? p.sender_id : p.receiver_id;
              const label = isReceived ? "From" : "To";
              return `
            <div class="payment-item p-4">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                  <div style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.04); display: flex; align-items: center; justify-content: center;">
                    <i class="ph ${arrowIcon}" style="color: ${arrowColor}; font-size: 18px;"></i>
                  </div>
                  <div>
                    <p style="font-weight: 500; font-size: 14px;">${label}: ${counterparty}</p>
                    <p style="font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-top: 2px;">${new Date(p.initiated_at).toLocaleString()}</p>
                  </div>
                </div>
                <div style="text-align: right;">
                  <p style="color: ${amountColor}; font-weight: 600; font-size: 15px;">${amountPrefix}₹${Number(p.amount).toLocaleString("en-IN")}</p>
                  <p class="${statusClass}" style="font-size: 12px; margin-top: 2px;">${p.status}</p>
                </div>
              </div>
            </div>
          `;
            })
            .join("");
        } catch (err) {
          document.getElementById("payments-list").innerHTML =
            '<p style="color: #ef4444; text-align: center; padding: 48px 0; font-size: 14px;">Error loading transactions</p>';
        }
      }

      async function loadAnalytics() {
        try {
          // Fetch weekly analytics with proper period param
          const res = await apiCall("/merchant/analytics?period=weekly");
          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.detail || "Failed to load analytics");
          }

          // Support both current and legacy payload shapes.
          const summary = data.weekly || data;
          const totalReceived = Number(
            summary.total_received ?? summary.total_amount ?? 0,
          );
          const transactionCount = Number(
            summary.transaction_count ?? summary.total_transactions ?? 0,
          );
          const avgTransaction = Number(
            summary.average_transaction ?? summary.avg_amount ?? 0,
          );
          const period = summary.period || data.period || "weekly";

          // Weekly summary - map backend fields correctly
          const weeklySummary = document.getElementById("weekly-summary");
          weeklySummary.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
              <span style="color: rgba(255, 255, 255, 0.6); font-size: 13px;">Total Revenue</span>
              <span style="font-weight: 600; color: #10b981; font-size: 14px;">₹${totalReceived.toLocaleString("en-IN")}</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
              <span style="color: rgba(255, 255, 255, 0.6); font-size: 13px;">Transactions</span>
              <span style="font-weight: 600; font-size: 14px;">${transactionCount}</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
              <span style="color: rgba(255, 255, 255, 0.6); font-size: 13px;">Avg. Transaction</span>
              <span style="font-weight: 600; font-size: 14px;">₹${avgTransaction.toLocaleString("en-IN")}</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
              <span style="color: rgba(255, 255, 255, 0.6); font-size: 13px;">Period</span>
              <span style="font-weight: 600; font-size: 14px; text-transform: capitalize;">${period}</span>
            </div>
          `;

          // Top customers - map backend top_payers correctly
          const topCustomers = document.getElementById("top-customers");
          const topCustomerRows = data.top_payers || data.top_customers || [];
          if (topCustomerRows.length > 0) {
            topCustomers.innerHTML = topCustomerRows
              .slice(0, 5)
              .map(
                (c, i) => `
              <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
                <div style="display: flex; align-items: center; gap: 12px;">
                  <span style="width: 24px; height: 24px; border-radius: 50%; background: rgba(255, 255, 255, 0.08); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;">${i + 1}</span>
                  <span style="font-size: 13px;">${c.user_id || c.customer_id || "Unknown"}</span>
                </div>
                <span style="color: #10b981; font-weight: 500; font-size: 14px;">₹${Number(c.total ?? c.total_amount ?? 0).toLocaleString("en-IN")}</span>
              </div>
            `,
              )
              .join("");
          } else {
            // Fallback: derive top customers from recent transactions if analytics returns empty
            const txRes = await apiCall("/transactions/?limit=100");
            const txData = await txRes.json();
            const txns = Array.isArray(txData)
              ? txData
              : txData.transactions || [];
            const payerTotals = {};
            txns.forEach((t) => {
              if (
                t.status === "COMPLETED" &&
                t.receiver_id === currentUser.user_id &&
                t.sender_id
              ) {
                payerTotals[t.sender_id] =
                  (payerTotals[t.sender_id] || 0) + Number(t.amount || 0);
              }
            });

            const fallbackTop = Object.entries(payerTotals)
              .map(([userId, total]) => ({ user_id: userId, total }))
              .sort((a, b) => b.total - a.total)
              .slice(0, 5);

            if (fallbackTop.length > 0) {
              topCustomers.innerHTML = fallbackTop
                .map(
                  (c, i) => `
                <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
                  <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="width: 24px; height: 24px; border-radius: 50%; background: rgba(255, 255, 255, 0.08); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;">${i + 1}</span>
                    <span style="font-size: 13px;">${c.user_id}</span>
                  </div>
                  <span style="color: #10b981; font-weight: 500; font-size: 14px;">₹${Number(c.total || 0).toLocaleString("en-IN")}</span>
                </div>
              `,
                )
                .join("");
            } else {
              topCustomers.innerHTML =
                '<p style="color: rgba(255, 255, 255, 0.4); text-align: center; padding: 32px 0; font-size: 14px;">No customer data yet</p>';
            }
          }
        } catch (err) {
          console.error("Analytics error:", err);
          document.getElementById("weekly-summary").innerHTML =
            '<p style="color: rgba(255, 255, 255, 0.4); text-align: center; padding: 32px 0; font-size: 14px;">Error loading analytics</p>';
        }
      }

      function logout() {
        apiCall("/auth/logout", { method: "POST" }).finally(() => {
          localStorage.clear();
          document.cookie = "jatayu_token=; Max-Age=0; Path=/; SameSite=Lax";
          window.location.href = "/login";
        });
      }

      // Send Payment Modal functions
      function showSendPaymentModal() {
        document
          .getElementById("send-payment-modal")
          .classList.remove("hidden");
        document.getElementById("send-payment-form").reset();
        document.getElementById("send-payment-error").classList.add("hidden");
        document.getElementById("send-payment-success").classList.add("hidden");
      }

      function closeSendPaymentModal() {
        document.getElementById("send-payment-modal").classList.add("hidden");
      }

      async function resolveReceiverId(inputValue) {
        const value = (inputValue || "").trim();
        if (!value) {
          throw new Error("Recipient is required");
        }

        // Fast path: already looks like a Jatayu user ID.
        if (/^[CM][A-Z0-9_]+$/i.test(value)) {
          return value.toUpperCase();
        }

        // Fallback: resolve by email/user search.
        const searchRes = await apiCall(
          `/users/search?q=${encodeURIComponent(value)}`,
        );
        const searchData = await searchRes.json();
        if (!searchRes.ok) {
          throw new Error(searchData.detail || "Unable to find recipient");
        }

        const results = searchData.results || [];
        if (!results.length) {
          throw new Error("Recipient not found. Use a valid user ID or email.");
        }

        return results[0].user_id;
      }

      async function handleSendPayment(e) {
        e.preventDefault();
        const errorEl = document.getElementById("send-payment-error");
        const successEl = document.getElementById("send-payment-success");
        const submitBtn = document.querySelector(
          '#send-payment-form button[type="submit"]',
        );
        const originalBtnHtml = submitBtn ? submitBtn.innerHTML : "";
        errorEl.classList.add("hidden");
        successEl.classList.add("hidden");
        errorEl.textContent = "";

        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<i class="ph ph-spinner animate-spin mr-2"></i> Processing...';
        }

        const receiver = document
          .getElementById("payment-receiver")
          .value.trim();
        const amount = parseFloat(
          document.getElementById("payment-amount").value,
        );
        const note = document.getElementById("payment-note").value.trim();

        if (!receiver || !amount || amount <= 0) {
          errorEl.textContent = "Please enter valid recipient and amount";
          errorEl.classList.remove("hidden");
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnHtml;
          }
          return;
        }

        try {
          const resolvedReceiverId = await resolveReceiverId(receiver);
          const res = await apiCall("/transactions/", {
            method: "POST",
            body: JSON.stringify({
              receiver_id: resolvedReceiverId,
              amount: amount,
              type: resolvedReceiverId.startsWith("M") ? "PAYMENT" : "TRANSFER",
              description: note || undefined,
            }),
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.detail || "Transaction failed");
          }

          successEl.textContent = `Payment sent to ${resolvedReceiverId}. Status: ${data.status}`;
          successEl.classList.remove("hidden");

          // Reload data after short delay
          setTimeout(() => {
            closeSendPaymentModal();
            loadAll();
          }, 1500);
        } catch (err) {
          const message = err?.message || "Transaction failed";
          errorEl.textContent = message;
          errorEl.classList.remove("hidden");

          if (
            message.toLowerCase().includes("suspend") ||
            message.toLowerCase().includes("block")
          ) {
            errorEl.appendChild(document.createElement("br"));
            const link = document.createElement("a");
            link.href = "/suspended";
            link.textContent = "Contact Support to Resolve";
            link.style.color = "#fbbf24";
            link.style.textDecoration = "underline";
            link.style.fontWeight = "600";
            errorEl.appendChild(link);
          }
        } finally {
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnHtml;
          }
        }
      }
    </script>
  </body>
</html>
